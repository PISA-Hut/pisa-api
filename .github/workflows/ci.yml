name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.8"
      # `--no-install-project` skips installing the package itself
      # (we don't have a [build-system] yet — that lands in Phase 2);
      # dev/dependency groups still install so ruff and pytest are
      # available.
      - run: uv sync --locked --all-groups --no-install-project
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run pytest -x
